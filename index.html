<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Террасная доска</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 16px;
            color: #1a1a1a;
            background-image: url('https://i.pinimg.com/1200x/fb/5a/a9/fb5aa9de090566b80e3112395cd4bcee.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(44, 40, 35, 0.45);
            z-index: 0;
        }
        #app {
            position: relative;
            z-index: 1;
        }
        .header {
            background: rgba(255, 252, 249, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 24px 20px 20px 20px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .header h1 {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #4a3f35;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .header .accent-line {
            width: 40px;
            height: 2px;
            background: #d5c8b8;
            margin: 8px auto 0 auto;
            border-radius: 2px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }
        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.6);
            width: 100%;
        }
        .card:active {
            transform: scale(0.96);
        }
        .card .image {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: #e0d6cc;
            display: block;
        }
        .card .image-placeholder {
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            background: #f0ebe6;
        }
        .card .info {
            padding: 12px 14px 14px 14px;
            text-align: center;
        }
        .card .name {
            font-weight: 300;
            font-size: 16px;
            letter-spacing: 1px;
            color: #4a3f35;
            text-transform: uppercase;
        }
        .card .badge {
            display: none;
        }
        .info-block {
            background: rgba(255, 252, 249, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 20px;
            margin-top: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .info-block .image-full {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 16px;
            background: #e0d6cc;
        }
        .info-block .image-full-placeholder {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            background: #f0ebe6;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .info-block h3 {
            font-size: 20px;
            font-weight: 600;
            color: #3d352c;
            margin-bottom: 8px;
        }
        .info-block .section {
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid rgba(0,0,0,0.06);
        }
        .info-block .section h4 {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #7a6a5a;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }
        .info-block .section p {
            font-size: 15px;
            line-height: 1.7;
            color: #4a3f35;
            white-space: pre-line;
        }
        .info-block .price {
            font-size: 20px;
            font-weight: 700;
            color: #8b7355;
            margin-top: 8px;
        }
        .recommendation {
            background: rgba(245, 240, 235, 0.6);
            border-radius: 12px;
            padding: 18px 16px;
            margin-top: 16px;
            border-left: 3px solid #d5c8b8;
        }
        .recommendation .item {
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .recommendation .item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .recommendation .item b {
            color: #3d352c;
        }
        .btn-site {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 28px;
            background: transparent;
            color: #6a5a4a;
            text-decoration: none;
            border-radius: 24px;
            border: 1.5px solid #d5c8b8;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
            text-align: center;
        }
        .btn-site:active {
            background: rgba(213, 200, 184, 0.25);
            border-color: #b8a898;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            margin-top: 12px;
        }
        .btn-success {
            background: #c97b5a;
            color: white;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(201, 123, 90, 0.3);
        }
        .btn-success:active {
            opacity: 0.85;
            transform: scale(0.98);
        }
        .hidden {
            display: none !important;
        }
        .back-btn {
            background: none;
            border: none;
            color: #8b7355;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 12px;
            padding: 0;
        }
        .back-btn:active {
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="header">
            <h1>Террасная доска</h1>
            <div class="accent-line"></div>
        </div>

        <!-- Главное меню / Подменю -->
        <div class="grid" id="grid"></div>

        <!-- Детальная информация -->
        <div class="info-block hidden" id="detail">
            <button class="back-btn" id="backBtn">← Назад</button>
            <div id="detailImageContainer"></div>
            <h3 id="detailName"></h3>
            <p id="detailDesc" style="font-size:15px;line-height:1.7;color:#4a3f35;margin-bottom:12px;"></p>
            
            <div class="section">
                <h4>➕ Плюсы</h4>
                <p id="detailPros"></p>
            </div>
            
            <div class="section">
                <h4>➖ Минусы</h4>
                <p id="detailCons"></p>
            </div>
            
            <div class="section">
                <h4>🧹 Уход</h4>
                <p id="detailCare"></p>
            </div>
            
            <div class="section">
                <h4>📋 Характеристики</h4>
                <p id="detailSpecs"></p>
            </div>
            
            <div class="price" id="detailPrice"></div>
            
            <div id="recommendations"></div>
            
            <button class="btn btn-success" id="backToMenuBtn">В главное меню</button>
        </div>
    </div>

    <script>
        // ================================================================
        // 1. ДАННЫЕ
        // ================================================================

        // --- НОВАЯ СТРУКТУРА: КАТЕГОРИИ И ПОДКАТЕГОРИИ ---
        const categories = [

            {

                    { id: 'декинг', name: 'Декинг', badge: '' }
                ]
            },
            {

                materials: [
                    { id: 'монтаж', name: 'Монтаж', badge: '' }
                ]
            }
        ];

        // --- КАРТИНКИ ДЛЯ МАТЕРИАЛОВ ---
        const IMAGES = {
            'лиственница': 'https://i.pinimg.com/736x/f4/85/f1/f485f13473e78c8fe19022f9c529d084.jpg',
            'ясень': 'https://i.pinimg.com/736x/fb/7c/eb/fb7ceb406f68979c665a5f324a68e57b.jpg',
            'кумару': 'https://i.pinimg.com/736x/37/ea/40/37ea400092963c619c00589fbc7cd146.jpg',
            'ипе': 'https://i.pinimg.com/736x/37/ea/40/37ea400092963c619c00589fbc7cd146.jpg',
            'тик': 'https://i.pinimg.com/736x/37/ea/40/37ea400092963c619c00589fbc7cd146.jpg',

        const EMOJI_PLACEHOLDER = {

        // --- ОПИСАНИЯ МАТЕРИАЛОВ ---
        const details = {
            'лиственница': {
                desc: 'Сибирская лиственница — это морозостойкая и влагостойкая древесина. Идеально подходит для террас в регионах с холодным климатом. Со временем становится только прочнее.',

            'ясень': {

                pros: '✅ Натуральный вид дерева\n✅ Устойчивость к влаге\n✅ Тёплый цвет\n✅ Экологичный материал',
                cons: '❌ Дороже обычной древесины\n❌ Требует ухода\n❌ Может выцветать на солнце',
                care: '🧹 Регулярно подметать\n💧 Мыть водой из шланга\n🛡️ Масляная пропитка раз в 2 года',
                specs: '⏳ Срок службы: 20-25 лет\n📊 Класс: Термодревесина\n💧 Водостойкость: Высокая',
                price: 'от 5 900 ₽/м²'
            },
            'кумару': {
                desc: 'Кумару — это экзотическая порода дерева из Южной Америки. Отличается высокой плотностью, твёрдостью и устойчивостью к гниению. Идеальна для террас в сложных климатических условиях.',
                pros: '✅ Экзотический вид\n✅ Высокая плотность и твёрдость\n✅ Устойчивость к гниению\n✅ Не боится насекомых',
                cons: '❌ Высокая цена\n❌ Тяжёлый материал\n❌ Требует специального крепежа',

                price: 'от 8 500 ₽/м²'
            },
            'ипе': {
                desc: 'Ипе (бразильский орех) — одна из самых твёрдых и долговечных экзотических пород. Почти не гниёт и не поражается насекомыми. Идеальна для террас, причалов и зон с интенсивной нагрузкой.',

                cons: '❌ Очень высокая цена\n❌ Требует специального крепежа\n❌ Тяжёлый материал',
                care: '🧹 Регулярно подметать\n💧 Мыть водой из шланга\n🛡️ Масляная пропитка раз в 2-3 года',
                specs: '⏳ Срок службы: 40-50 лет\n📊 Класс: Экзотическая древесина\n💧 Водостойкость: Максимальная',
                price: 'от 12 000 ₽/м²'
            },
            'тик': {
                desc: 'Тик — это элитная экзотическая порода из Юго-Восточной Азии. Содержит природные масла, которые защищают древесину от влаги, грибка и насекомых. Ценится за красивую текстуру и золотистый оттенок.',
                pros: '✅ Природная защита от влаги\n✅ Красивая текстура\n✅ Долговечность\n✅ Не требует частого ухода',
                cons: '❌ Высокая цена\n❌ Ограниченный ресурс\n❌ Сложность обработки',
                care: '🧹 Регулярно подметать\n💧 Мыть водой из шланга\n🛡️ Масляная пропитка по желанию',
                specs: '⏳ Срок службы: 30-50 лет\n📊 Класс: Экзотическая древесина\n💧 Водостойкость: Максимальная',
                price: 'от 11 000 ₽/м²'
            },
            'декинг': {
                desc: 'Декинг (террасная доска) — это современное покрытие для открытых пространств. Изготавливается из ДПК (древесно-полимерного композита), который сочетает в себе эстетику дерева и практичность пластика. Не требует ухода, не гниёт и не выцветает.',
                pros: '✅ Устойчивость к влаге\n✅ Не требует покраски\n✅ Противоскользящая поверхность\n✅ Долговечность (25-30 лет)',
                cons: '❌ Высокая цена\n❌ Может нагреваться на солнце\n❌ Требует правильного монтажа',
                care: '🧹 Регулярно подметать\n💧 Мыть водой из шланга\n🧽 Для пятен — мягкие моющие средства',
                specs: '⏳ Срок службы: 25-30 лет\n📊 Класс: ДПК / Натуральная древесина\n💧 Водостойкость: Высокая',
                price: 'от 3 500 ₽/м²'
            },
            'монтаж': {
                desc: 'Правильный монтаж террасной доски — залог долговечности. Важно выбрать правильный крепёж (скрытый или открытый), оставить зазоры для расширения и использовать качественные лаги.',
                pros: '✅ Скрытый крепёж для эстетичного вида\n✅ Зазоры для вентиляции и расширения\n✅ Прочные лаги из ДПК или металла\n✅ Долговечность при правильной укладке',
                cons: '❌ Сложность монтажа (требует навыков)\n❌ Дорогостоящий крепёж\n❌ Ошибки монтажа ведут к деформации',
                care: '🔧 Использовать только рекомендованный крепёж\n📏 Соблюдать зазоры (3-5 мм)\n🌬️ Обеспечить вентиляцию снизу',
                specs: '⏳ Рекомендации: Уклон 1-2% для стока воды\n📊 Крепёж: Нержавеющая сталь\n💧 Водостойкость: Зависит от крепежа',

        // --- РЕКОМЕНДАЦИИ ДЛЯ МАТЕРИАЛОВ ---
        const recommendations = {
            'декинг': [
                { name: 'Декинг ДПК', brand: 'WoodLine', url: 'https://principfloor.ru/catalog/decking/dpk/', price: 'от 3 500 ₽/м²', desc: 'Композитная доска, не требует покраски' },
                { name: 'Декинг термоясень', brand: 'WoodLine', url: 'https://principfloor.ru/catalog/decking/termoyasen/', price: 'от 5 900 ₽/м²', desc: 'Термообработанный ясень для террас' }
            ],
            'кумару': [
                { name: 'Кумару премиум', brand: 'Tropical', url: 'https://principfloor.ru/catalog/decking/kumaru/', price: 'от 8 500 ₽/м²', desc: 'Экзотическая порода, высокая плотность' }
            ],
            'ясень': [
                { name: 'Термоясень', brand: 'WoodLine', url: 'https://principfloor.ru/catalog/decking/termoyasen/', price: 'от 5 900 ₽/м²', desc: 'Термообработанный ясень для террас' }
            ],
            'лиственница': [
                { name: 'Лиственница Сибирская', brand: 'SiberianWood', url: 'https://principfloor.ru/catalog/decking/larch/', price: 'от 4 500 ₽/м²', desc: 'Морозостойкая, влагостойкая' }
            ],
            'ипе': [
                { name: 'Ипе премиум', brand: 'Tropical', url: 'https://principfloor.ru/catalog/decking/ipe/', price: 'от 12 000 ₽/м²', desc: 'Самый твёрдый и долговечный материал' }
            ],
            'тик': [
                { name: 'Тик элит', brand: 'Tropical', url: 'https://principfloor.ru/catalog/decking/teak/', price: 'от 11 000 ₽/м²', desc: 'Элитная древесина с природными маслами' }
            ]
        };

        // ================================================================
        // 2. ЛОГИКА
        // ================================================================

        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentView = 'main'; // 'main' | 'submenu' | 'detail'
        let currentCategoryId = null;

        function getImageUrl(id) {
            return IMAGES[id] || null;
        }

        function getEmoji(id) {
            return EMOJI_PLACEHOLDER[id] || '📦';
        }

        function renderMainMenu() {
            currentView = 'main';
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            categories.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img class="image" src="${cat.image}" alt="${cat.name}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="image-placeholder" style="display:none;">📦</div>
                    <div class="info">
                        <div class="name">${cat.name}</div>
                    </div>
                `;
                card.onclick = () => renderSubMenu(cat.id);
                grid.appendChild(card);
            });
        }

        function renderSubMenu(categoryId) {
            currentView = 'submenu';
            currentCategoryId = categoryId;
            const category = categories.find(c => c.id === categoryId);
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            // Кнопка "Назад"
            const backCard = document.createElement('div');
            backCard.className = 'card';
            backCard.style.background = 'rgba(255,252,249,0.6)';
            backCard.innerHTML = `
                <div class="info" style="padding:20px;">
                    <div class="name" style="font-size:14px;color:#8b7355;">← Назад</div>
                </div>
            `;
            backCard.onclick = renderMainMenu;
            grid.appendChild(backCard);

            // Материалы категории
            category.materials.forEach(mat => {
                const card = document.createElement('div');
                card.className = 'card';
                const imgUrl = getImageUrl(mat.id);
                card.innerHTML = `
                    ${imgUrl 
                        ? `<img class="image" src="${imgUrl}" alt="${mat.name}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
                        : ''
                    }
                    <div class="image-placeholder" style="${imgUrl ? 'display:none;' : ''}">${getEmoji(mat.id)}</div>
                    <div class="info">
                        <div class="name">${mat.name}</div>
                    </div>
                `;
                card.onclick = () => showDetail(mat.id);
                grid.appendChild(card);
            });
        }

        function renderRecommendations(materialId) {
            const container = document.getElementById('recommendations');
            const items = recommendations[materialId];
            if (!items || items.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            let html = '<div class="recommendation"><h4 style="margin-bottom:12px; color: #6a5a4a; font-weight:500; letter-spacing:0.5px;">🛍️ Рекомендуемые товары</h4>';
            items.forEach(item => {
                html += `
                    <div class="item">
                        <b>${item.name}</b> (${item.brand})
                        <br>📝 ${item.desc}
                        <br>💰 <b>${item.price}</b>
                        <br>
                        <a href="${item.url}" target="_blank" class="btn-site">🔗 Перейти на сайт</a>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function showDetail(id) {
            currentView = 'detail';
            const data = details[id];
            const imgUrl = getImageUrl(id);
            const name = id.charAt(0).toUpperCase() + id.slice(1);

            document.getElementById('grid').classList.add('hidden');
            document.getElementById('detail').classList.remove('hidden');

            const container = document.getElementById('detailImageContainer');
            if (imgUrl) {
                container.innerHTML = `<img class="image-full" src="${imgUrl}" alt="${name}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`;
            } else {
                container.innerHTML = `<div class="image-full-placeholder">${getEmoji(id)}</div>`;
            }

            document.getElementById('detailName').textContent = name;
            document.getElementById('detailDesc').textContent = data.desc;
            document.getElementById('detailPros').textContent = data.pros;
            document.getElementById('detailCons').textContent = data.cons;
            document.getElementById('detailCare').textContent = data.care;
            document.getElementById('detailSpecs').textContent = data.specs;
            document.getElementById('detailPrice').textContent = data.price;

            renderRecommendations(id);

            tg.HapticFeedback.impactOccurred('medium');
        }

        function goToMainMenu() {
            currentView = 'main';
            document.getElementById('grid').classList.remove('hidden');
            document.getElementById('detail').classList.add('hidden');
            renderMainMenu();
        }

        // ================================================================
        // 3. ОБРАБОТЧИКИ
        // ================================================================

        document.getElementById('backBtn').onclick = () => {
            if (currentView === 'detail') {
                // Возвращаемся в подменю категории
                document.getElementById('detail').classList.add('hidden');
                document.getElementById('grid').classList.remove('hidden');
                if (currentCategoryId) {
                    renderSubMenu(currentCategoryId);
                } else {
                    renderMainMenu();
                }
            }
        };
        document.getElementById('backToMenuBtn').onclick = goToMainMenu;

        // ================================================================
        // 4. ЗАПУСК
        // ================================================================

        renderMainMenu();

        tg.MainButton.setText('Выбрать');
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            tg.close();
        });
    </script>
</body>
</html>
