<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Напольные покрытия</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 16px;
            color: #1a1a1a;
            min-height: 100vh;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }
        .header p {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 4px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }
        .card:active {
            transform: scale(0.96);
        }
        .card .image {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: #e0e0e0;
            display: block;
        }
        .card .image-placeholder {
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            background: #e8f0fe;
        }
        .card .info {
            padding: 12px 14px 14px 14px;
        }
        .card .name {
            font-weight: 600;
            font-size: 14px;
        }
        .card .badge {
            display: inline-block;
            font-size: 10px;
            background: #e8f0fe;
            color: #1a73e8;
            padding: 2px 8px;
            border-radius: 12px;
            margin-top: 4px;
        }
        .info-block {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-top: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .info-block .image-full {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 16px;
            background: #e0e0e0;
        }
        .info-block .image-full-placeholder {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            background: #e8f0fe;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .info-block h3 {
            font-size: 22px;
            margin-bottom: 12px;
        }
        .info-block .section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }
        .info-block .section h4 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        .info-block .section p {
            font-size: 14px;
            line-height: 1.6;
            color: #555;
            white-space: pre-line;
        }
        .info-block .price {
            font-size: 20px;
            font-weight: 700;
            color: #1a73e8;
            margin-top: 8px;
        }
        .recommendation {
            background: #f0f7ff;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            border-left: 4px solid #1a73e8;
        }
        .recommendation a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 600;
        }
        .recommendation a:hover {
            text-decoration: underline;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
            margin-top: 12px;
        }
        .btn-success {
            background: #34a853;
            color: white;
        }
        .btn-success:active {
            opacity: 0.8;
        }
        .hidden {
            display: none !important;
        }
        .back-btn {
            background: none;
            border: none;
            color: #1a73e8;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="header">
            <h1>🏠 Напольные покрытия</h1>
            <p>Выберите материал для детальной информации</p>
        </div>

        <div class="grid" id="grid"></div>

        <div class="info-block hidden" id="detail">
            <button class="back-btn" id="backBtn">← Назад к списку</button>
            <div id="detailImageContainer"></div>
            <h3 id="detailName"></h3>
            <p id="detailDesc" style="font-size:15px;line-height:1.6;color:#333;margin-bottom:12px;"></p>
            
            <div class="section">
                <h4>✅ Плюсы</h4>
                <p id="detailPros"></p>
            </div>
            
            <div class="section">
                <h4>❌ Минусы</h4>
                <p id="detailCons"></p>
            </div>
            
            <div class="section">
                <h4>🧼 Уход</h4>
                <p id="detailCare"></p>
            </div>
            
            <div class="section">
                <h4>📊 Характеристики</h4>
                <p id="detailSpecs"></p>
            </div>
            
            <div class="price" id="detailPrice"></div>
            
            <div id="recommendations"></div>
            
            <button class="btn btn-success" id="backToMenuBtn">🏠 В главное меню</button>
        </div>
    </div>

    <script>
        // ================================================================
        // 1. ДАННЫЕ С КАРТИНКАМИ
        // ================================================================

        // --- Бесплатные изображения с Unsplash (можно заменить на свои) ---
        const IMAGES = {
            'ламинат': 'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=400&h=300&fit=crop',
            'композитный пол spc': 'https://images.unsplash.com/photo-1625139824712-5c9f96bc4cd8?w=400&h=300&fit=crop',
            'инженерная доска': 'https://images.unsplash.com/photo-1631884795763-09b0f3b7e9b8?w=400&h=300&fit=crop',
            'quartz parquet': 'https://images.unsplash.com/photo-1631884795763-09b0f3b7e9b8?w=400&h=300&fit=crop',
            'swf': 'https://images.unsplash.com/photo-1625139824712-5c9f96bc4cd8?w=400&h=300&fit=crop',
            'ковровое покрытие (рулонное)': 'https://images.unsplash.com/photo-1563089145-599997674d42?w=400&h=300&fit=crop'
        };

        // --- Плейсхолдеры на случай, если картинка не загрузится ---
        const EMOJI_PLACEHOLDER = {
            'ламинат': '🪵',
            'композитный пол spc': '🧱',
            'инженерная доска': '🪚',
            'quartz parquet': '🪵',
            'swf': '🪨',
            'ковровое покрытие (рулонное)': '🧶'
        };

        const materials = [
            { id: 'ламинат', name: 'Ламинат', badge: 'Популярный' },
            { id: 'композитный пол spc', name: 'Композитный пол SPC', badge: 'Водостойкий' },
            { id: 'инженерная доска', name: 'Инженерная доска', badge: 'Натуральный' },
            { id: 'quartz parquet', name: 'Quartz Parquet', badge: 'Премиум' },
            { id: 'swf', name: 'SWF', badge: 'Звукоизоляция' },
            { id: 'ковровое покрытие (рулонное)', name: 'Ковровое покрытие', badge: 'Уютный' }
        ];

        const recommendations = {
            'композитный пол spc': [
                { name: 'Fargo Bevel', brand: 'Fargo', url: 'https://principfloor.ru/catalog/vinilovaya_plitka/kompozitnyy_pol_spc_fargo_bevel_dub_monako.html', price: '2 990 ₽/м²', desc: 'Премиальный SPC с фаской, водостойкий, класс 43' },
                { name: 'Fargo Bevel Parquet', brand: 'Fargo', url: 'https://principfloor.ru/catalog/vinilovaya_plitka/kompozitnyy_pol_spc_fargo_bevel_parquet_dub_tikhuana.html', price: '3 090 ₽/м²', desc: 'SPC с паркетной фаской, дизайн под натуральное дерево' }
            ],
            'ламинат': [
                { name: 'MyFloor Residence', brand: 'MyFloor', url: 'https://principfloor.ru/catalog/laminat/laminat_my_floor_residence_dub_leyk_korichnevyy_33kl_1845x244x10mm_faska_4v_ml1022_up_1_8m2_4sht.html', price: '3 890 ₽/м²', desc: 'Ламинат 33 класса с замком Megaloc, влагостойкий' },
                { name: 'Pergo', brand: 'Pergo', url: 'https://principfloor.ru/catalog/laminat/laminat_pergo_uppsala_pro_dub_belostvolnyy_33kl_1200x190x8mm_faska_micro_8591_up_1_596m2_7sht.html', price: 'от 2 540 ₽/м²', desc: 'Премиальный ламинат с технологией TitanX, класс 33' }
            ],
            'swf': [
                { name: 'SWF (Палуба)', brand: 'MyStep', url: 'https://principfloor.ru/catalog/laminat/kamennyy_laminat_swf_svf/kamennyy_laminat_swf_svf_mystep_stone_stoun_dub_templ_33kl_1220x196x8mm_faska_4v_ms8608_up_1_435m2_6.html', price: '5 790 ₽/м²', desc: 'Каменный ламинат с классическим дизайном прямой доски' },
                { name: 'SWF (Английская ёлка)', brand: 'MyStep', url: 'https://principfloor.ru/catalog/laminat/kamennyy_laminat_swf_svf/kamennyy_laminat_swf_svf_mystep_stone_stoun_dub_templ_33kl_564x141x8mm_faska_4v_ms8618_up_1_431m2_18.html', price: '5 990 ₽/м²', desc: 'Каменный ламинат с дизайном английская ёлка, премиум-класс' }
            ]
        };

        const details = {
            'ламинат': {
                desc: 'Ламинат — это многослойное покрытие на основе HDF-плиты. Состоит из верхнего защитного слоя, декоративного слоя, основы и стабилизирующего слоя.',
                pros: '✅ Доступная цена\n✅ Простой монтаж (замковая система)\n✅ Устойчивость к истиранию\n✅ Широкий выбор дизайнов',
                cons: '❌ Боится воды (не для ванной и кухни)\n❌ Холодный на ощупь (требует подогрева)\n❌ Шумный при ходьбе (нужна подложка)',
                care: '🧹 Пылесосить или подметать ежедневно\n🧽 Мыть хорошо отжатой тряпкой (почти сухой)\n🚫 Не использовать абразивные средства и воск',
                specs: '⏳ Срок службы: 15-25 лет\n📊 Класс износостойкости: 31-33 (для дома), 34 (для коммерции)\n💧 Водостойкость: ❌ Низкая — не рекомендуется для влажных помещений',
                price: 'от 1 000 ₽/м²'
            },
            'композитный пол spc': {
                desc: 'SPC (Stone Polymer Composite) — это жёсткий виниловый пол на основе каменного полимерного композита. Состоит из ПВХ-подложки, декоративного слоя, SPC-сердечника (смесь кальцита и ПВХ) и износостойкого слоя. Абсолютно водостойкий, прочный и стабильный.',
                pros: '✅ Полная водостойкость (подходит для ванных и кухонь)\n✅ Высокая прочность и ударная вязкость\n✅ Тёплая на ощупь\n✅ Совместим с системой тёплого пола (до 50°C на клей)\n✅ Простой замковый монтаж',
                cons: '❌ Высокая цена\n❌ Требует идеально ровного основания\n❌ Может быть шумным при ходьбе (нужна подложка)',
                care: '🧹 Пылесосить или подметать\n🧽 Мыть с нейтральными моющими средствами\n🚫 Избегать абразивных паст и щелочей',
                specs: '⏳ Срок службы: 20-30 лет\n📊 Класс износостойкости: 43 (коммерческий класс)\n💧 Водостойкость: ✅ Высокая — абсолютно водостойкий',
                price: 'от 2 500 ₽/м²'
            },
            'инженерная доска': {
                desc: 'Инженерная доска — это трёхслойное покрытие из натурального дерева. Верхний слой — ценные породы (дуб, ясень), средний — влагостойкая фанера, нижний — стабилизирующий слой. Сочетает натуральность с устойчивостью к перепадам влажности.',
                pros: '✅ Натуральный внешний вид\n✅ Устойчивость к перепадам влажности\n✅ Можно укладывать на тёплый пол (до 28°C)\n✅ Многократная шлифовка (5-7 раз)\n✅ Долговечность',
                cons: '❌ Высокая цена\n❌ Требует профессионального монтажа\n❌ Боится царапин и ударов\n❌ Требует регулярного ухода',
                care: '🧹 Пылесосить мягкой щеткой\n🧽 Мыть слегка влажной тряпкой\n🛡️ Использовать защитные средства для дерева\n🛠️ Обновлять лак каждые 3-5 лет',
                specs: '⏳ Срок службы: 25-40 лет\n📊 Класс износостойкости: 33-34 (коммерческая нагрузка)\n💧 Водостойкость: 🟡 Средняя — допускается кратковременное воздействие влаги',
                price: 'от 5 500 ₽/м²'
            },
            'quartz parquet': {
                desc: 'Quartz Parquet — это инженерная доска с кварцевым сердечником (агломерат) и верхним слоем из натурального шпона. Сочетает стабильность кварцевого композита с эстетикой натурального дерева. Не боится влаги и перепадов температур.',
                pros: '✅ Натуральный шпон (эстетика дерева)\n✅ Устойчивость к влаге и перепадам температур\n✅ Можно укладывать на тёплый пол (до 28°C)\n✅ Высокая износостойкость (класс 33-34)\n✅ Стабильная геометрия',
                cons: '❌ Высокая цена\n❌ Требует профессионального монтажа\n❌ Боится царапин и ударов\n❌ Ограниченный выбор пород дерева',
                care: '🧹 Пылесосить мягкой щеткой\n🧽 Мыть слегка влажной тряпкой\n🛡️ Использовать защитные средства для дерева\n🛠️ Обновлять лак каждые 3-5 лет',
                specs: '⏳ Срок службы: 25-40 лет\n📊 Класс износостойкости: 33-34 (коммерческая нагрузка)\n💧 Водостойкость: 🟡 Средняя — устойчива к влажности, но требует защиты от залива',
                price: 'от 6 500 ₽/м²'
            },
            'swf': {
                desc: 'SWF (Stone Wood Floor) — это композитный пол на основе SPC-сердечника с улучшенной звукоизоляцией благодаря встроенной подложке. Сохраняет все преимущества SPC: водостойкость, прочность и стабильность.',
                pros: '✅ Абсолютная водостойкость (подходит для ванных и кухонь)\n✅ Повышенная звукоизоляция (встроенная подложка)\n✅ Высокая ударная прочность\n✅ Простой замковый монтаж\n✅ Совместим с тёплым полом (до 28°C)',
                cons: '❌ Высокая цена (премиальный сегмент)\n❌ Требует идеально ровного основания\n❌ Ограниченный выбор дизайнов',
                care: '🧹 Пылесосить или подметать\n🧽 Мыть с нейтральными моющими средствами\n🚫 Избегать абразивных паст и щелочей',
                specs: '⏳ Срок службы: 20-30 лет\n📊 Класс износостойкости: 43 (коммерческий класс)\n💧 Водостойкость: ✅ Высокая — абсолютно водостойкий',
                price: 'от 4 000 ₽/м²'
            },
            'ковровое покрытие (рулонное)': {
                desc: 'Ковровое покрытие (рулонное) — это текстильный напольный материал, который обеспечивает тепло, уют и звукоизоляцию. Подходит для спален, детских и гостиных.',
                pros: '✅ Мягкое и тёплое\n✅ Хорошая звукоизоляция\n✅ Скрывает неровности пола\n✅ Огромный выбор цветов и текстур\n✅ Доступная цена',
                cons: '❌ Сложный уход (пыль, пятна, запахи)\n❌ Недолговечный (вытирается)\n❌ Не подходит для влажных помещений\n❌ Требует регулярной чистки',
                care: '🧹 Регулярно пылесосить\n🧽 Пятна удалять специальными средствами\n🧼 Профессиональная химчистка 1-2 раза в год',
                specs: '⏳ Срок службы: 5-10 лет в зависимости от нагрузки\n📊 Класс износостойкости: 32-34 (коммерческая нагрузка)\n💧 Водостойкость: ❌ Низкая — не для влажных помещений',
                price: 'от 1 000 ₽/м²'
            }
        };

        // ================================================================
        // 2. ЛОГИКА
        // ================================================================

        const tg = window.Telegram.WebApp;
        tg.expand();

        let selectedMaterial = null;

        function getImageUrl(id) {
            return IMAGES[id] || null;
        }

        function getEmoji(id) {
            return EMOJI_PLACEHOLDER[id] || '📦';
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            materials.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';
                const imgUrl = getImageUrl(m.id);
                card.innerHTML = `
                    ${imgUrl 
                        ? `<img class="image" src="${imgUrl}" alt="${m.name}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
                        : ''
                    }
                    <div class="image-placeholder" style="${imgUrl ? 'display:none;' : ''}">${getEmoji(m.id)}</div>
                    <div class="info">
                        <div class="name">${m.name}</div>
                        <span class="badge">${m.badge}</span>
                    </div>
                `;
                card.onclick = () => showDetail(m.id);
                grid.appendChild(card);
            });
        }

        function renderRecommendations(materialId) {
            const container = document.getElementById('recommendations');
            const items = recommendations[materialId];
            if (!items || items.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            let html = '<div class="recommendation"><h4 style="margin-bottom:12px;">🛍️ Рекомендуемые товары</h4>';
            items.forEach(item => {
                html += `
                    <div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #eee;">
                        <b>${item.name}</b> (${item.brand})
                        <br>📝 ${item.desc}
                        <br>💰 <b>${item.price}</b>
                        <br><a href="${item.url}" target="_blank">🔗 Перейти на сайт</a>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function showDetail(id) {
            selectedMaterial = id;
            const data = details[id];
            const material = materials.find(m => m.id === id);
            const imgUrl = getImageUrl(id);

            document.getElementById('grid').classList.add('hidden');
            document.getElementById('detail').classList.remove('hidden');

            const container = document.getElementById('detailImageContainer');
            if (imgUrl) {
                container.innerHTML = `<img class="image-full" src="${imgUrl}" alt="${material.name}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`;
            } else {
                container.innerHTML = `<div class="image-full-placeholder">${getEmoji(id)}</div>`;
            }

            document.getElementById('detailName').textContent = `${material.name}`;
            document.getElementById('detailDesc').textContent = data.desc;
            document.getElementById('detailPros').textContent = data.pros;
            document.getElementById('detailCons').textContent = data.cons;
            document.getElementById('detailCare').textContent = data.care;
            document.getElementById('detailSpecs').textContent = data.specs;
            document.getElementById('detailPrice').textContent = data.price;

            renderRecommendations(id);

            tg.HapticFeedback.impactOccurred('medium');
        }

        function goToMainMenu() {
            document.getElementById('grid').classList.remove('hidden');
            document.getElementById('detail').classList.add('hidden');
            selectedMaterial = null;
        }

        // ================================================================
        // 3. ОБРАБОТЧИКИ
        // ================================================================

        document.getElementById('backBtn').onclick = goToMainMenu;
        document.getElementById('backToMenuBtn').onclick = goToMainMenu;

        // ================================================================
        // 4. ЗАПУСК
        // ================================================================

        renderGrid();

        tg.MainButton.setText('Выбрать');
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            if (selectedMaterial) {
                tg.sendData(JSON.stringify({ action: 'select', material: selectedMaterial }));
                tg.close();
            } else {
                tg.showPopup({
                    title: 'Внимание',
                    message: 'Выберите покрытие',
                    buttons: [{ type: 'ok' }]
                });
